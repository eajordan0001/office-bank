# 工作流名稱
name: Deploy Web App to GitHub Pages

# 觸發時機：當 main 分支有 push 動作時
on:
  push:
    branches:
      - main

# 權限設定：允許寫入內容至 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 步驟 1: 下載您的程式碼

      - name: Setup Pages
        uses: actions/configure-pages@v4 # 步驟 2: 配置 GitHub Pages 環境

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3 # 步驟 3: 打包並上傳所有檔案 (index.html, sw.js 等)
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 步驟 4: 正式發佈至網頁網址