<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優兒代購系統</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e91e63">
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f5f5f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #e91e63; }
        .balance { font-size: 2em; font-weight: bold; margin: 20px 0; color: #333; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #e91e63; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:active { background: #ad1457; }
        #logs { text-align: left; margin-top: 20px; font-size: 0.9em; }
        .log-item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h1>優兒代購系統</h1>
    <div id="login-section">
        <input type="text" id="userId" placeholder="請輸入使用者 ID (如: YF001)">
        <button onclick="login()">登入系統</button>
    </div>

    <div id="main-section" style="display:none;">
        <p>歡迎，<span id="display-id"></span></p>
        <div class="balance">餘額：$<span id="balance-value">--</span></div>
        
        <input type="number" id="amount" placeholder="金額">
        <input type="text" id="item" placeholder="品項 (如: 拿鐵)">
        <button onclick="handleTransaction('deduct')">確認扣款</button>
        <button style="background:#4caf50;" onclick="handleTransaction('recharge')">儲值金額</button>
        
        <div id="logs">
            <strong>最近紀錄：</strong>
            <div id="log-list">載入中...</div>
        </div>
    </div>
</div>

<script>
    // --- 核心設定區區 (已嵌入您的 GAS 網址) ---
    const CONFIG = {
        apiUrl: "https://script.google.com/macros/s/AKfycbwWp8FVSNq7KEcnzvWoe48aTdW1c8Q32-QUeAhYwnunjbhKGNJR16ozsgU9C5YV0SnIfg/exec",
        token: "YOUR_CUSTOM_TOKEN" // 請確保與 GAS 端的 ACCESS_TOKEN 一致
    };

    let currentUserId = "";

    function login() {
        const idInput = document.getElementById('userId').value.trim();
        if (!idInput) return alert("請輸入 ID");
        currentUserId = idInput;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-section').style.display = 'block';
        document.getElementById('display-id').innerText = currentUserId;
        fetchData();
    }

    async function fetchData() {
        const res = await fetch(CONFIG.apiUrl, {
            method: "POST",
            body: JSON.stringify({
                action: "getLogs",
                userId: currentUserId,
                token: CONFIG.token
            })
        });
        const data = await responseToJson(res);
        if (data.status === "success") {
            updateUI(data);
        }
    }

    async function handleTransaction(type) {
        const amount = document.getElementById('amount').value;
        const item = document.getElementById('item').value;
        if (!amount || !item) return alert("請填寫金額與品項");

        const res = await fetch(CONFIG.apiUrl, {
            method: "POST",
            body: JSON.stringify({
                action: type,
                userId: currentUserId,
                amount: amount,
                item: item,
                token: CONFIG.token
            })
        });
        const data = await responseToJson(res);
        alert(data.message);
        if (data.status === "success") {
            fetchData();
            document.getElementById('amount').value = '';
            document.getElementById('item').value = '';
        }
    }

    async function responseToJson(res) {
        return await res.json();
    }

    function updateUI(data) {
        if (data.logs && data.logs.length > 0) {
            document.getElementById('balance-value').innerText = data.logs[0].balance;
            let logHtml = '';
            data.logs.forEach(log => {
                logHtml += `<div class="log-item">
                    <span>${log.date} ${log.item}</span>
                    <span style="color:${log.type === '扣款' ? 'red' : 'green'}">${log.type}${log.amount}</span>
                </div>`;
            });
            document.getElementById('log-list').innerHTML = logHtml;
        } else {
            document.getElementById('log-list').innerHTML = '尚無紀錄';
        }
    }

    // 註冊 PWA Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker 註冊成功"))
            .catch(err => console.log("Service Worker 註冊失敗", err));
    }
</script>

</body>
</html>
