<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室代買系統</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #e91e63; --bg: #f5f5f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .log-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .negative { color: red; } .positive { color: green; }
    </style>
</head>
<body>
    <h2>辦公室代買系統</h2>

    <div class="card">
        <h3>代買扣款</h3>
        <select id="userSelect"><option value="YF001">小明 (YF001)</option></select>
        <input type="text" id="itemName" placeholder="交易項目 (如：咖啡)">
        <input type="number" id="amount" placeholder="金額">
        <button onclick="handleTransaction('deduct')">確認扣款</button>
    </div>

    <div class="card">
        <h3>交易紀錄</h3>
        <button style="background:#666;" onclick="loadLogs()">整理紀錄</button>
        <div id="logList"></div>
    </div>

    <script>
        // 註冊 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function apiCall(data) {
            const url = localStorage.getItem('gas_url');
            const token = localStorage.getItem('access_token');
            if (!url) return alert("請先在設定中配置 API URL");

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({ ...data, token: token })
                });
                return await response.json();
            } catch (e) { alert("連線失敗"); return null; }
        }

        async function handleTransaction(action) {
            const data = {
                action: action,
                userId: document.getElementById('userSelect').value,
                item: document.getElementById('itemName').value || "未命名項目",
                amount: document.getElementById('amount').value
            };
            const res = await apiCall(data);
            if (res && res.status === 'success') {
                alert(res.message + "！新餘額：" + res.newBalance);
                loadLogs();
            }
        }

        async function loadLogs() {
            const res = await apiCall({ action: 'getLogs', userId: 'all' });
            if (res && res.logs) {
                const list = document.getElementById('logList');
                list.innerHTML = res.logs.map(log => `
                    <div class="log-item">
                        <div><b>${log.item}</b><br><small>${log.date}</small></div>
                        <div class="${log.type==='扣款'?'negative':'positive'}">
                            ${log.type==='扣款'?'-':'+'}${log.amount}
                        </div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
